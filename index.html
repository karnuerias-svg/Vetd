<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Health Log Book</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Load Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Sarabun', 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-teal-500 text-white p-2 rounded-lg">
                <i class="ph ph-paw-print text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">Pet Health Log Book</h1>
                <p class="text-xs text-slate-500">ระบบบันทึกและติดตามอาการสัตว์เลี้ยง</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden">
        <div class="max-w-7xl mx-auto h-full flex flex-col md:flex-row">
            
            <!-- LEFT PANEL: Form -->
            <div class="w-full md:w-1/3 lg:w-1/4 bg-white border-r border-slate-200 h-full overflow-y-auto p-6 flex flex-col shadow-sm relative z-0">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <i class="ph ph-plus-circle text-teal-500"></i> บันทึกเคสใหม่
                </h2>

                <form id="logForm" class="space-y-4 flex-1">
                    
                    <!-- Pet ID -->
                    <div>
                        <label for="petId" class="block text-sm font-medium text-slate-700 mb-1">รหัสสัตว์เลี้ยง (ID)</label>
                        <input type="text" id="petId" required placeholder="เช่น PET-001"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none bg-slate-50 focus:bg-white text-sm">
                    </div>

                    <!-- Pet Name -->
                    <div>
                        <label for="petName" class="block text-sm font-medium text-slate-700 mb-1">ชื่อสัตว์เลี้ยง</label>
                        <input type="text" id="petName" required placeholder="เช่น น้องทองหยิบ"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none bg-slate-50 focus:bg-white text-sm">
                    </div>

                    <!-- Phone Input -->
                    <div>
                        <label for="ownerPhone" class="block text-sm font-medium text-slate-700 mb-1">เบอร์โทรติดต่อ (เจ้าของ)</label>
                        <input type="tel" id="ownerPhone" placeholder="เช่น 0812345678"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none bg-slate-50 focus:bg-white text-sm">
                    </div>

                    <!-- OPD/IPD Selection -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">ประเภทผู้ป่วย</label>
                        <div class="flex gap-4">
                            <label class="flex-1 relative cursor-pointer group">
                                <input type="radio" name="patientType" value="OPD" checked class="peer sr-only">
                                <div class="px-4 py-2 border border-slate-200 rounded-lg text-center peer-checked:border-teal-500 peer-checked:bg-teal-50 peer-checked:text-teal-700 hover:bg-slate-50 transition-all">
                                    <span class="text-sm font-semibold">OPD</span>
                                    <p class="text-[10px] text-slate-500 mt-0.5 group-hover:text-slate-600 peer-checked:text-teal-600">ผู้ป่วยนอก</p>
                                </div>
                            </label>
                            <label class="flex-1 relative cursor-pointer group">
                                <input type="radio" name="patientType" value="IPD" class="peer sr-only">
                                <div class="px-4 py-2 border border-slate-200 rounded-lg text-center peer-checked:border-purple-500 peer-checked:bg-purple-50 peer-checked:text-purple-700 hover:bg-slate-50 transition-all">
                                    <span class="text-sm font-semibold">IPD</span>
                                    <p class="text-[10px] text-slate-500 mt-0.5 group-hover:text-slate-600 peer-checked:text-purple-600">ผู้ป่วยใน</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Date Input -->
                    <div>
                        <label for="logDate" class="block text-sm font-medium text-slate-700 mb-1">วันที่เข้ารับการรักษา</label>
                        <input type="date" id="logDate" required
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none bg-slate-50 focus:bg-white text-sm">
                    </div>

                    <!-- Symptoms -->
                    <div>
                        <label for="symptoms" class="block text-sm font-medium text-slate-700 mb-1">อาการสำคัญ (แรกรับ)</label>
                        <textarea id="symptoms" required rows="3" placeholder="ระบุอาการเบื้องต้นที่พบ..."
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none resize-none bg-slate-50 focus:bg-white text-sm"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 mt-4 shadow-sm">
                        <i class="ph ph-floppy-disk text-lg"></i> บันทึกข้อมูลแรกรับ
                    </button>
                </form>
            </div>

            <!-- RIGHT PANEL: Log History -->
            <div class="w-full md:w-2/3 lg:w-3/4 h-full flex flex-col bg-slate-50/50">
                
                <!-- Search Bar -->
                <div class="p-6 pb-2 shrink-0">
                    <div class="relative max-w-xl">
                        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" id="searchInput" placeholder="ค้นหาจาก ชื่อสัตว์, ID หรือ เบอร์โทรศัพท์..."
                            class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-full focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none shadow-sm text-sm">
                    </div>
                </div>

                <!-- Logs Container -->
                <div class="flex-1 overflow-y-auto p-6 pt-4">
                    <div id="logsContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                        <!-- Cards will be dynamically inserted here -->
                    </div>
                    
                    <!-- Empty State -->
                    <div id="emptyState" class="hidden h-full flex-col items-center justify-center text-slate-400 pb-20">
                        <i class="ph ph-files text-6xl mb-4 opacity-50"></i>
                        <p class="text-lg font-medium">ยังไม่มีประวัติการรักษา</p>
                        <p class="text-sm">กรอกข้อมูลด้านซ้ายเพื่อเพิ่มบันทึกใหม่</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Set today's date as default
        document.getElementById('logDate').valueAsDate = new Date();

        // State: Array to store log entries
        let petLogs = [];
        
        // DOM Elements
        const form = document.getElementById('logForm');
        const logsContainer = document.getElementById('logsContainer');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');

        // Handle form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Get values from inputs
            const patientTypeElement = document.querySelector('input[name="patientType"]:checked');
            
            const newLog = {
                id: Date.now().toString(), // Unique ID
                petId: document.getElementById('petId').value.trim(),
                petName: document.getElementById('petName').value.trim(),
                ownerPhone: document.getElementById('ownerPhone').value.trim(),
                patientType: patientTypeElement ? patientTypeElement.value : 'OPD',
                isDischarged: false, // เพิ่มสถานะการกลับบ้าน
                dischargeTimestamp: "", // เพิ่มเวลาที่กลับบ้าน
                date: document.getElementById('logDate').value,
                symptoms: document.getElementById('symptoms').value.trim(),
                updateNote: "", // ว่างไว้ตอนแรกรับ
                updateTimestamp: "", // เวลาอัปเดต
                createdTimestamp: new Date().toLocaleString('th-TH')
            };

            // Add to array (newest first)
            petLogs.unshift(newLog);

            // Reset form (keep date)
            const currentDate = document.getElementById('logDate').value;
            form.reset();
            document.getElementById('logDate').value = currentDate;
            // Focus back on ID
            document.getElementById('petId').focus();

            // Render updated logs
            renderLogs(searchInput.value.toLowerCase());
        });

        // Handle search input
        searchInput.addEventListener('input', function(e) {
            renderLogs(e.target.value.toLowerCase());
        });

        // Function to render logs to UI
        function renderLogs(filterText = '') {
            // Filter logs based on search text
            const filteredLogs = petLogs.filter(log => {
                return log.petName.toLowerCase().includes(filterText) || 
                       log.petId.toLowerCase().includes(filterText) ||
                       (log.ownerPhone && log.ownerPhone.includes(filterText));
            });

            // Show/Hide empty state
            if (filteredLogs.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                logsContainer.innerHTML = '';
                return;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            // Generate HTML for each log
            logsContainer.innerHTML = filteredLogs.map(log => {
                
                let patientTypeBadge = '';
                if (log.patientType === 'IPD') {
                    if (log.isDischarged) {
                        patientTypeBadge = '<span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-md border border-slate-200 flex items-center gap-1"><i class="ph ph-house"></i> IPD (กลับบ้านแล้ว)</span>';
                    } else {
                        patientTypeBadge = '<span class="text-[10px] font-bold px-2 py-0.5 bg-purple-100 text-purple-700 rounded-md border border-purple-200">IPD</span>';
                    }
                } else {
                    patientTypeBadge = '<span class="text-[10px] font-bold px-2 py-0.5 bg-teal-100 text-teal-700 rounded-md border border-teal-200">OPD</span>';
                }

                const phoneDisplay = log.ownerPhone 
                    ? `<span class="flex items-center gap-1" title="เบอร์โทรศัพท์"><i class="ph ph-phone"></i> ${log.ownerPhone}</span>` 
                    : '';

                return `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative group hover:shadow-md transition-shadow flex flex-col h-full">
                    
                    <!-- Delete Button -->
                    <button onclick="deleteLog('${log.id}')" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 rounded-full p-1" title="ลบบันทึก">
                        <i class="ph ph-trash text-xl"></i>
                    </button>

                    <!-- Card Header -->
                    <div class="mb-4 pr-8">
                        <div class="flex items-center gap-2 mb-1.5">
                            <h3 class="font-bold text-slate-800 text-lg">${log.petName}</h3>
                            <span class="text-xs font-medium px-2 py-0.5 bg-slate-100 text-slate-600 rounded-md border border-slate-200">ID: ${log.petId}</span>
                            ${patientTypeBadge}
                        </div>
                        <div class="flex flex-wrap items-center gap-3 text-xs text-slate-500">
                            <span class="flex items-center gap-1"><i class="ph ph-calendar-blank"></i> ${log.date}</span>
                            ${phoneDisplay}
                        </div>
                    </div>

                    <!-- Symptoms Section -->
                    <div class="bg-red-50/50 p-3 rounded-lg border border-red-100 mb-3 shrink-0">
                        <h4 class="text-xs font-semibold text-red-800 uppercase flex items-center gap-1 mb-1">
                            <i class="ph ph-warning-circle"></i> อาการสำคัญแรกรับ
                        </h4>
                        <p class="text-sm text-slate-700 whitespace-pre-line">${log.symptoms}</p>
                    </div>

                    <!-- Updates Section (Interactive) -->
                    <div id="update-wrapper-${log.id}" class="mt-auto">
                        <!-- Display Mode -->
                        <div id="display-mode-${log.id}">
                            ${log.updateNote ? `
                                <div class="bg-green-50/50 p-3 rounded-lg border border-green-100 relative group/edit">
                                    <div class="flex justify-between items-start mb-1">
                                        <div class="flex flex-col">
                                            <h4 class="text-xs font-semibold text-green-800 uppercase flex items-center gap-1">
                                                <i class="ph ph-stethoscope"></i> ความคืบหน้า / อัปเดตอาการ
                                            </h4>
                                            ${log.updateTimestamp ? `<span class="text-[10px] text-green-600/80 mt-0.5 flex items-center gap-1"><i class="ph ph-clock"></i> อัปเดตเมื่อ: ${log.updateTimestamp}</span>` : ''}
                                        </div>
                                        <button onclick="showEditForm('${log.id}')" class="text-green-600 hover:text-green-800 opacity-0 group-hover/edit:opacity-100 transition-opacity flex items-center gap-1 text-xs bg-green-100 px-2 py-0.5 rounded cursor-pointer mt-0.5">
                                            <i class="ph ph-pencil-simple"></i> แก้ไข
                                        </button>
                                    </div>
                                    <p class="text-sm text-slate-700 whitespace-pre-line mt-2">${log.updateNote}</p>
                                </div>
                            ` : `
                                <button onclick="showEditForm('${log.id}')" class="w-full text-sm text-teal-600 hover:text-teal-700 font-medium flex items-center justify-center gap-1 transition-colors px-3 py-2 rounded-lg border border-dashed border-teal-300 hover:border-teal-400 hover:bg-teal-50 cursor-pointer">
                                    <i class="ph ph-plus-circle text-lg"></i> เพิ่มอัปเดตอาการความคืบหน้า
                                </button>
                            `}
                        </div>
                        
                        <!-- Edit Mode (Hidden by default) -->
                        <div id="edit-mode-${log.id}" class="hidden bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <label class="block text-xs font-semibold text-slate-700 mb-1">บันทึกอัปเดตอาการ</label>
                            <textarea id="edit-input-${log.id}" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors outline-none resize-none text-sm mb-2">${log.updateNote}</textarea>
                            <div class="flex justify-end gap-2">
                                <button onclick="hideEditForm('${log.id}')" class="px-3 py-1 text-xs font-medium text-slate-600 hover:bg-slate-200 rounded transition-colors">ยกเลิก</button>
                                <button onclick="saveUpdate('${log.id}')" class="px-3 py-1 text-xs font-medium text-white bg-teal-600 hover:bg-teal-700 rounded transition-colors">บันทึกอัปเดต</button>
                            </div>
                        </div>
                    </div>

                    <!-- Discharge Action (Only for IPD) -->
                    ${log.patientType === 'IPD' ? `
                        <div class="mt-3 pt-3 border-t border-slate-100">
                            ${!log.isDischarged ? `
                                <label class="flex items-center gap-2 cursor-pointer group w-fit">
                                    <input type="checkbox" onchange="toggleDischarge('${log.id}')" class="w-4 h-4 text-purple-600 rounded border-slate-300 focus:ring-purple-500 cursor-pointer">
                                    <span class="text-sm font-medium text-slate-600 group-hover:text-slate-800 transition-colors">ติ๊กเมื่อส่งตัวกลับบ้านแล้ว (Discharge)</span>
                                </label>
                            ` : `
                                <div class="flex items-center justify-between">
                                    <span class="text-xs font-medium text-slate-500 flex items-center gap-1">
                                        <i class="ph ph-check-circle text-green-500 text-base"></i> 
                                        กลับบ้านแล้วเมื่อ: ${log.dischargeTimestamp}
                                    </span>
                                    <button onclick="toggleDischarge('${log.id}')" class="text-[10px] text-slate-400 hover:text-slate-600 underline">ยกเลิก</button>
                                </div>
                            `}
                        </div>
                    ` : ''}

                </div>
                `;
            }).join('');
        }

        // Function to delete log
        function deleteLog(id) {
            petLogs = petLogs.filter(log => log.id !== id);
            renderLogs(searchInput.value.toLowerCase());
        }

        // Functions to handle inline editing
        function showEditForm(id) {
            document.getElementById(`display-mode-${id}`).classList.add('hidden');
            document.getElementById(`edit-mode-${id}`).classList.remove('hidden');
            document.getElementById(`edit-input-${id}`).focus();
        }

        function hideEditForm(id) {
            document.getElementById(`edit-mode-${id}`).classList.add('hidden');
            document.getElementById(`display-mode-${id}`).classList.remove('hidden');
            
            // Reset textarea value to original in case of cancellation
            const log = petLogs.find(l => l.id === id);
            if (log) {
                document.getElementById(`edit-input-${id}`).value = log.updateNote;
            }
        }

        function saveUpdate(id) {
            const newValue = document.getElementById(`edit-input-${id}`).value.trim();
            const logIndex = petLogs.findIndex(l => l.id === id);
            
            if(logIndex > -1) {
                petLogs[logIndex].updateNote = newValue;
                // Update Timestamp only if there's actual text
                if (newValue) {
                    petLogs[logIndex].updateTimestamp = new Date().toLocaleString('th-TH');
                } else {
                    petLogs[logIndex].updateTimestamp = "";
                }
                renderLogs(searchInput.value.toLowerCase());
            }
        }

        // Function to toggle discharge status for IPD
        function toggleDischarge(id) {
            const logIndex = petLogs.findIndex(l => l.id === id);
            if(logIndex > -1) {
                petLogs[logIndex].isDischarged = !petLogs[logIndex].isDischarged;
                
                // Set or clear timestamp based on status
                if (petLogs[logIndex].isDischarged) {
                    petLogs[logIndex].dischargeTimestamp = new Date().toLocaleString('th-TH');
                } else {
                    petLogs[logIndex].dischargeTimestamp = "";
                }
                
                renderLogs(searchInput.value.toLowerCase());
            }
        }

        // Initial render
        renderLogs();
    </script>
</body>
</html>
